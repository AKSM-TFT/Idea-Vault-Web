services:
  backend:
    build: ./idea-vault-backend
    container_name: idea-vault-backend
    ports:
      - "8000:8000"
    env_file:
      - ./idea-vault-backend/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./idea-vault-frontend
      args:
        # Points the frontend to the backend — change to your server's IP/domain in prod
        VITE_API_URL: http://localhost:8000
    container_name: idea-vault-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
